<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="СушіХаус">
    <link rel="apple-touch-icon" href="IMG_0329.jpeg">
    <title>Замовлення СушіХаус</title>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg-color: #f2f2f7;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #000000;
            --text-secondary: #8e8e93;
            --accent: #ff6b00;
            --danger: #ff3b30;
            --input-bg: rgba(0, 0, 0, 0.05);
            --item-border: rgba(0, 0, 0, 0.1);
            --shadow: rgba(0, 0, 0, 0.08);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --glass-bg: rgba(28, 28, 30, 0.65);
                --glass-border: rgba(255, 255, 255, 0.1);
                --text-main: #ffffff;
                --text-secondary: #ebebf5;
                --accent: #ff8c33;
                --danger: #ff453a;
                --input-bg: rgba(255, 255, 255, 0.1);
                --item-border: rgba(255, 255, 255, 0.1);
                --shadow: rgba(0, 0, 0, 0.5);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            background-image: radial-gradient(circle at 0% 0%, rgba(255, 107, 0, 0.15) 0%, transparent 50%), 
                              radial-gradient(circle at 100% 100%, rgba(255, 107, 0, 0.1) 0%, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: calc(env(safe-area-inset-top) + 20px) 16px calc(env(safe-area-inset-bottom) + 20px) 16px;
            -webkit-overflow-scrolling: touch; 
            overflow-x: hidden;
        }

        .header { text-align: center; margin-bottom: 16px; position: relative; }
        
        .logo {
            width: 90px; height: 90px; border-radius: 22px; box-shadow: 0 8px 24px var(--shadow);
            margin-bottom: 12px; background: var(--glass-bg);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            backdrop-filter: blur(20px) saturate(180%); object-fit: cover;
        }

        h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 16px;}

        /* Панель пошуку */
        .search-panel { padding: 2px; margin-bottom: 12px; }
        .search-panel input {
            width: 100%; height: 44px; background: var(--input-bg); border: none;
            border-radius: 14px; padding: 0 16px; color: var(--text-main); font-size: 16px;
            font-family: inherit;
        }

        /* Панель прогрес-бару */
        .progress-panel { padding: 12px 16px; margin-bottom: 16px; }
        .progress-info { display: flex; justify-content: space-between; font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
        .progress-bar { width: 100%; height: 6px; background: var(--input-bg); border-radius: 3px; overflow: hidden; }
        #progress-fill { height: 100%; width: 0%; background: var(--accent); border-radius: 3px; transition: width 0.3s ease; }

        .action-buttons {
            display: flex; justify-content: space-between; gap: 8px; margin-bottom: 16px;
        }

        .btn-secondary {
            flex: 1; background: var(--glass-bg); border: 1px solid var(--glass-border);
            color: var(--text-main); border-radius: 14px; padding: 10px 2px;
            font-size: 14px; font-weight: 600; cursor: pointer; text-align: center;
            -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
            transition: opacity 0.2s;
            display: flex; align-items: center; justify-content: center;
            gap: 6px; height: 46px;
        }
        .btn-secondary span { font-size: 16px; }
        .btn-secondary:active { opacity: 0.6; }

        .glass-panel {
            background: var(--glass-bg); border-radius: 20px; border: 1px solid var(--glass-border);
            -webkit-backdrop-filter: blur(24px) saturate(180%); backdrop-filter: blur(24px) saturate(180%);
            box-shadow: 0 10px 30px var(--shadow); padding: 16px; margin-bottom: 20px;
            transform: translateZ(0); 
        }

        .category-title {
            font-size: 15px; font-weight: 700; color: var(--accent);
            margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.5px;
        }

        .list-container { display: flex; flex-direction: column; gap: 12px; }

        /* Рядок елемента оптимізований під жести */
        .item-row {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 12px; border-bottom: 1px solid var(--item-border);
            will-change: transform, background-color;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease, background-color 0.3s ease;
            border-radius: 8px;
        }

        .item-row:last-child { border-bottom: none; padding-bottom: 0; }
        .item-row.skipped { opacity: 0.35; }

        .item-name { font-size: 17px; font-weight: 500; flex: 1; padding-left: 4px; pointer-events: none; }

        .controls { display: flex; align-items: center; gap: 8px; pointer-events: auto; }

        input[type="number"] {
            width: 65px; height: 36px; background: var(--input-bg); border: none;
            border-radius: 10px; color: var(--text-main); font-size: 17px;
            font-weight: 600; text-align: center; font-family: inherit; -moz-appearance: textfield;
        }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .unit { font-size: 15px; color: var(--text-secondary); font-weight: 500; width: 24px; }

        .add-custom { display: flex; flex-direction: column; gap: 10px; }
        .add-row { display: flex; gap: 10px; }
        .add-custom input[type="text"] {
            flex: 1; height: 44px; background: var(--input-bg); border: none;
            border-radius: 12px; padding: 0 16px; color: var(--text-main); font-size: 17px;
        }
        .add-custom select {
            height: 44px; background: var(--input-bg); border: none;
            border-radius: 12px; padding: 0 8px; color: var(--text-main); font-size: 15px;
            font-family: inherit; flex: 1; -webkit-appearance: none;
        }

        .btn-add {
            height: 44px; background: var(--input-bg); color: var(--accent); border: none;
            border-radius: 12px; padding: 0 20px; font-size: 17px; font-weight: 600;
        }

        .btn-submit {
            width: 100%; height: 54px; background: var(--accent); color: #fff;
            border: none; border-radius: 16px; font-size: 17px; font-weight: 600;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 14px rgba(255, 107, 0, 0.4); margin-bottom: 20px;
        }
        .btn-submit:active { transform: scale(0.97); opacity: 0.9; }
    </style>
</head>
<body>

    <div class="header">
        <img src="IMG_0329.jpeg" alt="СушіХаус лого" class="logo">
        <h1>Замовлення</h1>
    </div>

    <div class="glass-panel search-panel">
        <input type="text" id="search-input" placeholder="🔍 Пошук інгредієнта..." oninput="handleSearch(this.value)">
    </div>

    <div class="glass-panel progress-panel">
        <div class="progress-info">
            <span>📊 Прогрес перевірки</span>
            <span id="progress-text">0 / 0</span>
        </div>
        <div class="progress-bar">
            <div id="progress-fill"></div>
        </div>
    </div>

    <div class="action-buttons">
        <button class="btn-secondary" onclick="sortItems()"><span>🔤</span>За алфавітом</button>
        <button class="btn-secondary" onclick="clearCounts()"><span>🔄</span>Очистити все</button>
    </div>

    <div id="lists-wrapper"></div>

    <div class="glass-panel">
        <div class="add-custom">
            <div class="add-row">
                <input type="text" id="new-item-input" placeholder="Новий інгредієнт...">
                <button class="btn-add" onclick="addNewItem()">Додати</button>
            </div>
            <select id="new-item-category">
                <option value="🐟 Риба та морепродукти">🐟 Риба та морепродукти</option>
                <option value="🧀 Сири та бакалія">🧀 Сири та бакалія</option>
                <option value="🥫 Соуси та приправи">🥫 Соуси та приправи</option>
                <option value="📦 Пакування та інвентар">📦 Пакування та інвентар</option>
            </select>
        </div>
    </div>

    <button class="btn-submit" onclick="sendToViber()">Надіслати у Viber</button>

    <script>
        const STORAGE_KEY = 'sushiHouseItems_v4';
        let currentSearch = '';

        const defaultItems = [
            { name: "Лосось", category: "🐟 Риба та морепродукти" },
            { name: "Копчений лосось", category: "🐟 Риба та морепродукти" },
            { name: "Креветки", category: "🐟 Риба та морепродукти" },
            { name: "Вугор", category: "🐟 Риба та морепродукти" },
            { name: "Бейбі восьминіг", category: "🐟 Риба та морепродукти" },
            { name: "Сніжний краб", category: "🐟 Риба та морепродукти" },
            { name: "Ікра масаго", category: "🐟 Риба та морепродукти" },
            
            { name: "Крем-сир", category: "🧀 Сири та бакалія" },
            { name: "Кляр темпура", category: "🧀 Сири та бакалія" },
            { name: "Сухарі панко", category: "🧀 Сири та бакалія" },
            { name: "Чука", category: "🧀 Сири та бакалія" },
            { name: "Норі", category: "🧀 Сири та бакалія" },
            { name: "Рис", category: "🧀 Сири та бакалія" },
            
            { name: "Соус Унагі", category: "🥫 Соуси та приправи" },
            { name: "Горіховий соус", category: "🥫 Соуси та приправи" },
            { name: "Устричний соус", category: "🥫 Соуси та приправи" },
            { name: "Імбир", category: "🥫 Соуси та приправи" },
            { name: "Васабі", category: "🥫 Соуси та приправи" },
            { name: "Мірін", category: "🥫 Соуси та приправи" },
            { name: "Кікоман", category: "🥫 Соуси та приправи" },
            { name: "Рисовий оцет", category: "🥫 Соуси та приправи" },
            { name: "Листя комбо", category: "🥫 Соуси та приправи" },
            
            { name: "Бамбукові листя", category: "📦 Пакування та інвентар" },
            { name: "Палички", category: "📦 Пакування та інвентар" },
            { name: "Фіксатори", category: "📦 Пакування та інвентар" },
            { name: "Макісу", category: "📦 Пакування та інвентар" }
        ];

        let appItems = [];

        function loadData() {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                appItems = JSON.parse(savedData);
            } else {
                appItems = defaultItems.map(item => ({ name: item.name, category: item.category, count: '', skipped: false }));
                saveData();
            }
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(appItems));
        }

        function getOrder(item) {
            if (item.skipped) return 3; 
            if (item.count !== '' && Number(item.count) > 0) return 2; 
            return 1; 
        }

        // Оновлення індикатора прогресу
        function updateProgress() {
            const total = appItems.length;
            const processed = appItems.filter(item => item.skipped || (item.count !== '' && Number(item.count) > 0)).length;
            
            document.getElementById('progress-text').innerText = `${processed} / ${total}`;
            const percentage = total > 0 ? (processed / total) * 100 : 0;
            document.getElementById('progress-fill').style.width = `${percentage}%`;
        }

        function renderItems() {
            const wrapper = document.getElementById('lists-wrapper');
            wrapper.innerHTML = '';

            const categories = [
                "🐟 Риба та морепродукти", 
                "🧀 Сири та бакалія", 
                "🥫 Соуси та приправи", 
                "📦 Пакування та інвентар"
            ];

            categories.forEach(cat => {
                const catItems = appItems.filter(item => {
                    const matchesCat = item.category === cat;
                    const matchesSearch = item.name.toLowerCase().includes(currentSearch.toLowerCase().trim());
                    return matchesCat && matchesSearch;
                });

                if (catItems.length === 0) return;

                const panel = document.createElement('div');
                panel.className = 'glass-panel';

                const title = document.createElement('div');
                title.className = 'category-title';
                title.innerText = cat;
                panel.appendChild(title);

                const listContainer = document.createElement('div');
                listContainer.className = 'list-container';

                catItems.forEach(item => {
                    const globalIndex = appItems.findIndex(i => i.name === item.name);

                    const row = document.createElement('div');
                    row.className = 'item-row' + (item.skipped ? ' skipped' : '');
                    row.style.order = getOrder(item);
                    row.id = 'item-row-' + globalIndex;
                    
                    row.innerHTML = `
                        <div class="item-name">${item.name}</div>
                        <div class="controls">
                            <input type="number" inputmode="numeric" min="0" placeholder="0" 
                                   value="${item.count}" 
                                   oninput="handleInput(${globalIndex}, this.value)"
                                   onblur="handleBlur(${globalIndex})">
                            <span class="unit">шт</span>
                        </div>
                    `;
                    listContainer.appendChild(row);
                });

                panel.appendChild(listContainer);
                wrapper.appendChild(panel);
            });

            updateProgress();
        }

        function handleSearch(value) {
            currentSearch = value;
            renderItems();
        }

        function handleInput(index, value) {
            if (value < 0) value = 0;
            appItems[index].count = value;
            if (value !== '' && Number(value) > 0) {
                appItems[index].skipped = false;
            }
            saveData();
            updateProgress();
        }

        function handleBlur(index) {
            const row = document.getElementById('item-row-' + index);
            if (row) {
                row.style.order = getOrder(appItems[index]);
                row.className = 'item-row' + (appItems[index].skipped ? ' skipped' : '');
            }
        }

        function toggleSkip(index) {
            appItems[index].skipped = !appItems[index].skipped;
            if (appItems[index].skipped) {
                appItems[index].count = '';
                const row = document.getElementById('item-row-' + index);
                if (row) row.querySelector('input').value = '';
            }
            saveData();
            renderItems();
        }

        function addNewItem() {
            const input = document.getElementById('new-item-input');
            const catSelect = document.getElementById('new-item-category');
            const itemName = input.value.trim();
            const category = catSelect.value;

            if (itemName !== "") {
                appItems.push({ name: itemName, category: category, count: '', skipped: false });
                saveData();
                input.value = ''; 
                renderItems(); 
            }
        }

        function deleteItem(index) {
            if (confirm(`Видалити "${appItems[index].name}" зі списку повністю?`)) {
                appItems.splice(index, 1);
                saveData();
                renderItems();
            }
        }

        function clearCounts() {
            if (confirm('Очистити всі кількості та повернути список до початкового стану?')) {
                appItems.forEach(item => {
                    item.count = '';
                    item.skipped = false;
                });
                saveData();
                renderItems();
            }
        }

        function sortItems() {
            if (confirm('Відсортувати інгредієнти всередині категорій за алфавітом?')) {
                appItems.sort((a, b) => a.name.localeCompare(b.name, 'uk'));
                saveData();
                renderItems();
            }
        }

        function sendToViber() {
            let messageText = "Замовлення СушіХаус\n\n";
            let hasOrders = false;

            appItems.forEach(item => {
                const count = parseInt(item.count);
                if (!isNaN(count) && count > 0 && !item.skipped) {
                    messageText += `${item.name}: ${count} шт\n`;
                    hasOrders = true;
                }
            });

            if (!hasOrders) {
                alert("Будь ласка, вкажіть кількість хоча б для одного інгредієнта!");
                return;
            }

            const encodedText = encodeURIComponent(messageText);
            window.location.href = `viber://forward?text=${encodedText}`;
        }

        // --- ЛОГІКА iOS СВАЙП-ЖЕСТІВ (120Hz ОПТИМІЗАЦІЯ) ---
        let touchStartX = 0;
        let touchStartY = 0;
        let activeRow = null;
        let isSwiping = false;

        const wrapper = document.getElementById('lists-wrapper');
        
        wrapper.addEventListener('touchstart', (e) => {
            const row = e.target.closest('.item-row');
            if (!row) return;
            activeRow = row;
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            activeRow.style.transition = 'none'; // Вимикаємо анімацію під час руху пальця
            isSwiping = false;
        }, { passive: true });

        wrapper.addEventListener('touchmove', (e) => {
            if (!activeRow) return;
            const currentX = e.touches[0].clientX;
            const currentY = e.touches[0].clientY;
            const dX = currentX - touchStartX;
            const dY = currentY - touchStartY;

            // Визначаємо, що це саме горизонтальний свайп, а не вертикальний скрол сторінки
            if (!isSwiping && Math.abs(dX) > Math.abs(dY) && Math.abs(dX) > 10) {
                isSwiping = true;
            }

            if (isSwiping) {
                if (e.cancelable) e.preventDefault();
                
                // Еластичний опір при сильному свайпі (Apple Physics)
                let translateX = dX;
                if (dX > 100) translateX = 100 + (dX - 100) * 0.2;
                if (dX < -100) translateX = -100 + (dX + 100) * 0.2;
                
                activeRow.style.transform = `translateX(${translateX}px)`;
                
                // Зміна фону для візуальної підказки дії
                if (dX > 40) {
                    activeRow.style.backgroundColor = 'rgba(255, 107, 0, 0.1)'; // Помаранчевий (пропуск)
                } else if (dX < -40) {
                    activeRow.style.backgroundColor = 'rgba(255, 59, 48, 0.1)'; // Червоний (видалення)
                } else {
                    activeRow.style.backgroundColor = '';
                }
            }
        }, { passive: false });

        wrapper.addEventListener('touchend', (e) => {
            if (!activeRow) return;
            
            // Повертаємо плавну рідну анімацію повернення на місце
            activeRow.style.transition = 'transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.3s ease';
            activeRow.style.transform = '';
            activeRow.style.backgroundColor = '';

            const dX = e.changedTouches[0].clientX - touchStartX;
            const index = parseInt(activeRow.id.replace('item-row-', ''));

            if (isSwiping) {
                if (dX > 75) {
                    // Свайп праворуч -> пропустити (зробити сірим)
                    toggleSkip(index);
                } else if (dX < -75) {
                    // Свайп ліворуч -> видалити повністю
                    deleteItem(index);
                }
            }
            activeRow = null;
            isSwiping = false;
        });

        loadData();
        renderItems();
    </script>
</body>
</html>
