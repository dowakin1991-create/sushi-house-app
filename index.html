<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="СушіХаус">
    <link rel="apple-touch-icon" href="IMG_0329.jpeg">
    <title>Замовлення СушіХаус</title>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg-color: #f2f2f7;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #000000;
            --text-secondary: #8e8e93;
            --accent: #ff6b00;
            --danger: #ff3b30;
            --success: #34c759;
            --input-bg: rgba(0, 0, 0, 0.05);
            --item-border: rgba(0, 0, 0, 0.1);
            --shadow: rgba(0, 0, 0, 0.08);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --glass-bg: rgba(28, 28, 30, 0.65);
                --glass-border: rgba(255, 255, 255, 0.1);
                --text-main: #ffffff;
                --text-secondary: #ebebf5;
                --accent: #ff8c33;
                --danger: #ff453a;
                --success: #30d158;
                --input-bg: rgba(255, 255, 255, 0.1);
                --item-border: rgba(255, 255, 255, 0.1);
                --shadow: rgba(0, 0, 0, 0.5);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            background-image: radial-gradient(circle at 0% 0%, rgba(255, 107, 0, 0.15) 0%, transparent 50%), 
                              radial-gradient(circle at 100% 100%, rgba(255, 107, 0, 0.1) 0%, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: calc(env(safe-area-inset-top) + 20px) 16px calc(env(safe-area-inset-bottom) + 80px) 16px;
            -webkit-overflow-scrolling: touch; 
            overflow-x: hidden;
        }

        .header { text-align: center; margin-bottom: 16px; position: relative; }
        
        .logo {
            width: 90px; height: 90px; border-radius: 22px; box-shadow: 0 8px 24px var(--shadow);
            margin-bottom: 12px; background: var(--glass-bg);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            backdrop-filter: blur(20px) saturate(180%); object-fit: cover;
        }

        h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 16px;}

        /* Панель пошуку */
        .search-panel { padding: 2px; margin-bottom: 12px; }
        .search-panel input {
            width: 100%; height: 44px; background: var(--input-bg); border: none;
            border-radius: 14px; padding: 0 16px; color: var(--text-main); font-size: 16px;
            font-family: inherit;
        }

        /* Панель прогрес-бару */
        .progress-panel { padding: 12px 16px; margin-bottom: 16px; }
        .progress-info { display: flex; justify-content: space-between; font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
        .progress-bar { width: 100%; height: 6px; background: var(--input-bg); border-radius: 3px; overflow: hidden; }
        #progress-fill { height: 100%; width: 0%; background: var(--accent); border-radius: 3px; transition: width 0.3s ease; }

        /* Кнопки меню */
        .action-buttons {
            display: flex; justify-content: space-between; gap: 8px; margin-bottom: 16px;
        }

        .btn-secondary {
            flex: 1; background: var(--glass-bg); border: 1px solid var(--glass-border);
            color: var(--text-main); border-radius: 14px; padding: 8px 2px;
            font-size: 12px; font-weight: 600; cursor: pointer; text-align: center;
            -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
            transition: opacity 0.2s, transform 0.1s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 4px; height: 55px;
        }
        .btn-secondary span { font-size: 18px; }
        .btn-secondary:active { opacity: 0.6; transform: scale(0.96); }
        
        .focus-btn { background: var(--accent); color: white; border-color: var(--accent); }

        .glass-panel {
            background: var(--glass-bg); border-radius: 20px; border: 1px solid var(--glass-border);
            -webkit-backdrop-filter: blur(24px) saturate(180%); backdrop-filter: blur(24px) saturate(180%);
            box-shadow: 0 10px 30px var(--shadow); padding: 16px; margin-bottom: 20px;
            transform: translateZ(0); 
        }

        .category-title {
            font-size: 14px; font-weight: 800; color: var(--accent);
            margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.5px;
        }

        .list-container { display: flex; flex-direction: column; gap: 12px; }

        /* Рядки списку */
        .item-row {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 12px; border-bottom: 1px solid var(--item-border);
            will-change: transform, background-color;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease, background-color 0.3s ease;
        }
        .item-row:last-child { border-bottom: none; padding-bottom: 0; }
        .item-row.skipped { opacity: 0.35; }

        .item-name { font-size: 17px; font-weight: 500; flex: 1; padding-left: 4px; pointer-events: none; }
        .controls { display: flex; align-items: center; gap: 8px; pointer-events: auto; }

        input[type="number"] {
            width: 65px; height: 36px; background: var(--input-bg); border: none;
            border-radius: 10px; color: var(--text-main); font-size: 17px;
            font-weight: 600; text-align: center; font-family: inherit; -moz-appearance: textfield;
        }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .unit { font-size: 15px; color: var(--text-secondary); font-weight: 500; width: 24px; }

        /* --- СТИЛІ РЕЖИМУ ФОКУСУ (TINDER) --- */
        .focus-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 999; display: none;
            flex-direction: column; justify-content: space-between;
            padding: calc(env(safe-area-inset-top) + 20px) 20px calc(env(safe-area-inset-bottom) + 30px) 20px;
            animation: fadeIn 0.3s ease forwards;
            background-image: radial-gradient(circle at 50% 50%, rgba(255, 107, 0, 0.15) 0%, transparent 60%);
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .focus-header { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .btn-close-focus { background: var(--input-bg); border: none; padding: 8px 16px; border-radius: 12px; color: var(--text-main); font-weight: 600; font-size: 15px; }

        .card-container {
            flex: 1; display: flex; justify-content: center; align-items: center;
            position: relative; width: 100%; margin: 30px 0;
        }
        .focus-card {
            width: 100%; max-width: 350px; height: 340px;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 30px; box-shadow: 0 15px 35px var(--shadow);
            -webkit-backdrop-filter: blur(30px) saturate(180%); backdrop-filter: blur(30px) saturate(180%);
            padding: 30px; display: flex; flex-direction: column; justify-content: space-between; align-items: center;
            text-align: center; position: absolute; will-change: transform, opacity;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
        }
        .focus-card .card-cat { font-size: 14px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .focus-card .card-title { font-size: 28px; font-weight: 800; margin: 15px 0; color: var(--text-main); line-height: 1.2; }
        
        .focus-input-wrapper { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .focus-card input[type="number"] { width: 120px; height: 60px; font-size: 32px; border-radius: 16px; background: var(--input-bg); }
        .focus-card .unit { font-size: 22px; width: auto; color: var(--text-secondary); font-weight: 600; }

        .focus-actions { display: flex; gap: 12px; width: 100%; max-width: 350px; margin: 0 auto; }
        .btn-focus-skip { flex: 1; height: 56px; background: var(--input-bg); border: none; border-radius: 16px; color: var(--text-secondary); font-size: 17px; font-weight: 600; }
        .btn-focus-next { flex: 2; height: 56px; background: var(--accent); border: none; border-radius: 16px; color: white; font-size: 17px; font-weight: 600; box-shadow: 0 4px 12px rgba(255,107,0,0.3); }

        /* --- ВІДРЕДАГОВАНИЙ iOS TOAST ДЛЯ UNDO --- */
        .undo-toast {
            position: fixed; bottom: calc(env(safe-area-inset-bottom) + 20px); left: 16px; right: 16px;
            height: 54px; background: rgba(0, 0, 0, 0.85); color: white;
            border-radius: 16px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            /* Фікс багу з визиранням: опускаємо на 150px вниз, прибираємо видимість і кліки */
            transform: translateY(150px); opacity: 0; pointer-events: none;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
            z-index: 1000; -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
        }
        @media (prefers-color-scheme: dark) {
            .undo-toast { background: rgba(255, 255, 255, 0.95); color: black; }
        }
        /* Коли Toast активний, повертаємо його на місце */
        .undo-toast.show { 
            transform: translateY(0); 
            opacity: 1; 
            pointer-events: auto; 
        }
        .btn-undo-action { background: transparent; border: none; color: var(--accent); font-size: 15px; font-weight: 700; cursor: pointer; padding: 8px; }

        .add-custom { display: flex; flex-direction: column; gap: 10px; }
        .add-row { display: flex; gap: 10px; }
        .add-custom input[type="text"] {
            flex: 1; height: 44px; background: var(--input-bg); border: none;
            border-radius: 12px; padding: 0 16px; color: var(--text-main); font-size: 17px;
        }
        .add-custom select {
            height: 44px; background: var(--input-bg); border: none;
            border-radius: 12px; padding: 0 8px; color: var(--text-main); font-size: 15px;
            font-family: inherit; flex: 1; -webkit-appearance: none;
        }

        .btn-add { height: 44px; background: var(--input-bg); color: var(--accent); border: none; border-radius: 12px; padding: 0 20px; font-size: 17px; font-weight: 600; }

        .btn-submit {
            width: 100%; height: 54px; background: var(--accent); color: #fff;
            border: none; border-radius: 16px; font-size: 17px; font-weight: 600;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 14px rgba(255, 107, 0, 0.4); margin-bottom: 20px;
        }
        .btn-submit:active { transform: scale(0.97); opacity: 0.9; }
    </style>
</head>
<body>

    <div id="main-ui">
        <div class="header">
            <img src="IMG_0329.jpeg" alt="СушіХаус лого" class="logo">
            <h1>Замовлення</h1>
        </div>

        <div class="glass-panel search-panel">
            <input type="text" id="search-input" placeholder="🔍 Пошук інгредієнта..." oninput="handleSearch(this.value)">
        </div>

        <div class="glass-panel progress-panel">
            <div class="progress-info">
                <span>📊 Прогрес перевірки</span>
                <span id="progress-text">0 / 0</span>
            </div>
            <div class="progress-bar">
                <div id="progress-fill"></div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn-secondary focus-btn" onclick="openFocusMode()"><span>🎯</span>Фокус</button>
            <button class="btn-secondary" onclick="sortItems()"><span>🔤</span>Алфавіт</button>
            <button class="btn-secondary" onclick="clearCounts()"><span>🔄</span>Очистити</button>
        </div>

        <div id="lists-wrapper"></div>

        <div class="glass-panel">
            <div class="add-custom">
                <div class="add-row">
                    <input type="text" id="new-item-input" placeholder="Новий інгредієнт...">
                    <button class="btn-add" onclick="addNewItem()">Додати</button>
                </div>
                <select id="new-item-category">
                    <option value="🐟 Риба та морепродукти">🐟 Риба та морепродукти</option>
                    <option value="🧀 Сири та бакалія">🧀 Сири та бакалія</option>
                    <option value="🥫 Соуси та приправи">🥫 Соуси та приправи</option>
                    <option value="📦 Пакування та інвентар">📦 Пакування та інвентар</option>
                </select>
            </div>
        </div>

        <button class="btn-submit" onclick="sendToViber()">Надіслати у Viber</button>
    </div>

    <div id="focus-ui" class="focus-overlay">
        <div class="focus-header">
            <span style="font-weight:800; font-size:20px;">🎯 Фокус-режим</span>
            <button class="btn-close-focus" onclick="closeFocusMode()">Закрити</button>
        </div>
        
        <div class="card-container" id="card-container">
            </div>

        <div class="focus-actions">
            <button class="btn-focus-skip" onclick="focusSkip()">Пропустити</button>
            <button class="btn-focus-next" onclick="focusNext()">Записати ✓</button>
        </div>
    </div>

    <div id="undo-toast" class="undo-toast">
        <span id="undo-toast-text" style="font-weight: 500; font-size: 15px;">Дію виконано</span>
        <button class="btn-undo-action" onclick="triggerUndo()">СКАСУВАТИ</button>
    </div>

    <script>
        // Версія сховища (змінена для чистого старту)
        const STORAGE_KEY = 'sushiHouseItems_v6';
        let currentSearch = '';
        let appItems = [];
        let historyStack = [];
        let toastTimeout = null;

        const defaultItems = [
            { name: "Креветки", category: "🐟 Риба та морепродукти" },
            { name: "Вугор", category: "🐟 Риба та морепродукти" },
            { name: "Бейбі восьминіг", category: "🐟 Риба та морепродукти" },
            { name: "Ікра масаго", category: "🐟 Риба та морепродукти" },
            { name: "Лосось", category: "🐟 Риба та морепродукти" },
            { name: "Копчений лосось", category: "🐟 Риба та морепродукти" },
            { name: "Сніжний краб", category: "🐟 Риба та морепродукти" },
            
            { name: "Крем-сир", category: "🧀 Сири та бакалія" },
            { name: "Кляр темпура", category: "🧀 Сири та бакалія" },
            { name: "Сухарі панко", category: "🧀 Сири та бакалія" },
            { name: "Чука", category: "🧀 Сири та бакалія" },
            { name: "Норі", category: "🧀 Сири та бакалія" },
            { name: "Рис", category: "🧀 Сири та бакалія" },
            
            { name: "Соус Унагі", category: "🥫 Соуси та приправи" },
            { name: "Горіховий соус", category: "🥫 Соуси та приправи" },
            { name: "Устричний соус", category: "🥫 Соуси та приправи" },
            { name: "Імбир", category: "🥫 Соуси та приправи" },
            { name: "Васабі", category: "🥫 Соуси та приправи" },
            { name: "Мірін", category: "🥫 Соуси та приправи" },
            { name: "Кікоман", category: "🥫 Соуси та приправи" },
            { name: "Рисовий оцет", category: "🥫 Соуси та приправи" },
            { name: "Листя комбо", category: "🥫 Соуси та приправи" },
            
            { name: "Бамбукові листя", category: "📦 Пакування та інвентар" },
            { name: "Палички", category: "📦 Пакування та інвентар" },
            { name: "Фіксатори", category: "📦 Пакування та інвентар" },
            { name: "Макісу", category: "📦 Пакування та інвентар" }
        ];

        function loadData() {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                appItems = JSON.parse(savedData);
            } else {
                appItems = defaultItems.map(item => ({ name: item.name, category: item.category, count: '', skipped: false }));
                saveData();
            }
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(appItems));
        }

        // --- ЛОГІКА UNDO ---
        function pushToHistory(msg = "Зміни збережено") {
            if (historyStack.length >= 10) historyStack.shift();
            historyStack.push(JSON.stringify(appItems));
            showUndoToast(msg);
        }

        function showUndoToast(msg) {
            const toast = document.getElementById('undo-toast');
            document.getElementById('undo-toast-text').innerText = msg;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.remove('show'), 4000);
        }

        function triggerUndo() {
            if (historyStack.length > 0) {
                appItems = JSON.parse(historyStack.pop());
                saveData();
                renderItems();
                if(document.getElementById('focus-ui').style.display === 'flex') {
                    openFocusMode(); // Перезапускаємо фокус-режим з відкоченими даними
                }
                document.getElementById('undo-toast').classList.remove('show');
            }
        }

        // --- ЛОГІКА ВІДОБРАЖЕННЯ СПИСКУ ---
        function getOrder(item) {
            if (item.skipped) return 3; 
            if (item.count !== '' && Number(item.count) > 0) return 2; 
            return 1; 
        }

        function updateProgress() {
            const total = appItems.length;
            const processed = appItems.filter(item => item.skipped || (item.count !== '' && Number(item.count) > 0)).length;
            document.getElementById('progress-text').innerText = `${processed} / ${total}`;
            const percentage = total > 0 ? (processed / total) * 100 : 0;
            document.getElementById('progress-fill').style.width = `${percentage}%`;
        }

        function renderItems() {
            const wrapper = document.getElementById('lists-wrapper');
            wrapper.innerHTML = '';

            const categories = ["🐟 Риба та морепродукти", "🧀 Сири та бакалія", "🥫 Соуси та приправи", "📦 Пакування та інвентар"];

            categories.forEach(cat => {
                const catItems = appItems.filter(item => item.category === cat && item.name.toLowerCase().includes(currentSearch.toLowerCase().trim()));
                if (catItems.length === 0) return;

                const panel = document.createElement('div');
                panel.className = 'glass-panel';

                const title = document.createElement('div');
                title.className = 'category-title';
                title.innerText = cat;
                panel.appendChild(title);

                const listContainer = document.createElement('div');
                listContainer.className = 'list-container';

                catItems.forEach(item => {
                    const globalIndex = appItems.findIndex(i => i.name === item.name);
                    const row = document.createElement('div');
                    row.className = 'item-row' + (item.skipped ? ' skipped' : '');
                    row.style.order = getOrder(item);
                    row.id = 'item-row-' + globalIndex;
                    
                    row.innerHTML = `
                        <div class="item-name">${item.name}</div>
                        <div class="controls">
                            <input type="number" inputmode="numeric" min="0" placeholder="0" 
                                   value="${item.count}" 
                                   oninput="handleInput(${globalIndex}, this.value)"
                                   onblur="handleBlur(${globalIndex})">
                            <span class="unit">шт</span>
                        </div>
                    `;
                    listContainer.appendChild(row);
                });

                panel.appendChild(listContainer);
                wrapper.appendChild(panel);
            });
            updateProgress();
        }

        function handleSearch(value) {
            currentSearch = value;
            renderItems();
        }

        function handleInput(index, value) {
            if (value < 0) value = 0;
            appItems[index].count = value;
            if (value !== '' && Number(value) > 0) appItems[index].skipped = false;
            saveData();
            updateProgress();
        }

        function handleBlur(index) {
            const row = document.getElementById('item-row-' + index);
            if (row) {
                row.style.order = getOrder(appItems[index]);
                row.className = 'item-row' + (appItems[index].skipped ? ' skipped' : '');
            }
        }

        function toggleSkip(index) {
            pushToHistory(`Пропущено: ${appItems[index].name}`);
            appItems[index].skipped = !appItems[index].skipped;
            if (appItems[index].skipped) appItems[index].count = '';
            saveData();
            renderItems();
        }

        function addNewItem() {
            const input = document.getElementById('new-item-input');
            const catSelect = document.getElementById('new-item-category');
            const itemName = input.value.trim();
            if (itemName !== "") {
                pushToHistory(`Додано: ${itemName}`);
                appItems.push({ name: itemName, category: catSelect.value, count: '', skipped: false });
                saveData();
                input.value = ''; 
                renderItems(); 
            }
        }

        function deleteItem(index) {
            pushToHistory(`Видалено: ${appItems[index].name}`);
            appItems.splice(index, 1);
            saveData();
            renderItems();
        }

        function clearCounts() {
            if(confirm("Очистити всі введені цифри?")) {
                pushToHistory("Очищено весь список");
                appItems.forEach(item => { item.count = ''; item.skipped = false; });
                saveData();
                renderItems();
            }
        }

        function sortItems() {
            pushToHistory("Відсортовано за алфавітом");
            appItems.sort((a, b) => a.name.localeCompare(b.name, 'uk'));
            saveData();
            renderItems();
        }

        // --- ЛОГІКА РЕЖИМУ ФОКУСУ ---
        let focusItems = [];
        let currentFocusIdx = 0;

        function openFocusMode() {
            focusItems = appItems.filter(item => item.count === '' && !item.skipped);
            if (focusItems.length === 0) {
                alert("Усі інгредієнти перевірені! Немає що фокусувати.");
                return;
            }
            currentFocusIdx = 0;
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('focus-ui').style.display = 'flex';
            renderFocusCard();
            
            // Запит акселерометра (для iOS 13+)
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().catch(() => {});
            }
        }

        function closeFocusMode() {
            document.getElementById('focus-ui').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            renderItems();
        }

        function renderFocusCard() {
            const container = document.getElementById('card-container');
            container.innerHTML = '';

            if (currentFocusIdx >= focusItems.length) {
                container.innerHTML = `<div class="focus-card" style="justify-content:center; gap:20px;">
                    <span style="font-size:60px;">🎉</span>
                    <h2 class="card-title">Готово!</h2>
                    <p style="color:var(--text-secondary); font-size: 16px;">Усі позиції опрацьовано.</p>
                    <button class="btn-focus-next" style="width:100%; margin-top:20px;" onclick="closeFocusMode()">До списку</button>
                </div>`;
                document.querySelector('.focus-actions').style.display = 'none';
                return;
            }

            document.querySelector('.focus-actions').style.display = 'flex';
            const item = focusItems[currentFocusIdx];
            const globalIndex = appItems.findIndex(i => i.name === item.name);

            const card = document.createElement('div');
            card.className = 'focus-card';
            card.id = 'active-focus-card';
            card.innerHTML = `
                <div class="card-cat">${item.category}</div>
                <div class="card-title">${item.name}</div>
                <div class="focus-input-wrapper">
                    <input type="number" id="focus-input" inputmode="numeric" min="0" placeholder="0" 
                           value="${item.count}" oninput="handleInput(${globalIndex}, this.value)">
                    <span class="unit">шт</span>
                </div>
                <div style="font-size:14px; color:var(--text-secondary); font-weight:600;">Залишилось: ${focusItems.length - currentFocusIdx}</div>
            `;
            container.appendChild(card);
            
            // Легка затримка перед фокусом, щоб клавіатура з'явилася плавно
            setTimeout(() => {
                const inp = document.getElementById('focus-input');
                if(inp) inp.focus();
            }, 300);
            
            initCardSwipe(card);
        }

        function focusNext() {
            const input = document.getElementById('focus-input');
            if (input && input.value !== '' && Number(input.value) > 0) {
                pushToHistory(`Введено: ${focusItems[currentFocusIdx].name} (${input.value} шт)`);
                animateCard('left');
            } else {
                focusSkip();
            }
        }

        function focusSkip() {
            pushToHistory(`Пропущено: ${focusItems[currentFocusIdx].name}`);
            const item = focusItems[currentFocusIdx];
            const globalIndex = appItems.findIndex(i => i.name === item.name);
            appItems[globalIndex].skipped = true;
            appItems[globalIndex].count = '';
            saveData();
            animateCard('right');
        }

        function animateCard(direction) {
            const card = document.getElementById('active-focus-card');
            if (!card) return;
            card.style.transform = direction === 'left' ? 'translateX(-150%) rotate(-15deg)' : 'translateX(150%) rotate(15deg)';
            card.style.opacity = '0';
            setTimeout(() => {
                currentFocusIdx++;
                renderFocusCard();
            }, 300);
        }

        function initCardSwipe(card) {
            let startX = 0;
            card.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                card.style.transition = 'none';
            }, { passive: true });

            card.addEventListener('touchmove', (e) => {
                const moveX = e.touches[0].clientX - startX;
                if (e.target.tagName !== 'INPUT') {
                    card.style.transform = `translateX(${moveX}px) rotate(${moveX / 15}deg)`;
                }
            }, { passive: true });

            card.addEventListener('touchend', (e) => {
                card.style.transition = 'transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease';
                const finalX = e.changedTouches[0].clientX - startX;
                if (e.target.tagName !== 'INPUT') {
                    if (finalX > 100) focusSkip(); 
                    else if (finalX < -100) {
                        const globalIndex = appItems.findIndex(i => i.name === focusItems[currentFocusIdx].name);
                        if (appItems[globalIndex].count !== '') animateCard('left');
                        else card.style.transform = '';
                    } else card.style.transform = '';
                }
            });
        }

        // --- ЖЕСТИ ГОЛОВНОГО СПИСКУ (СВАЙПИ ВЛІВО/ВПРАВО) ---
        let touchStartX = 0; let touchStartY = 0; let activeRow = null; let isSwiping = false;
        const wrapperEl = document.getElementById('lists-wrapper');
        
        wrapperEl.addEventListener('touchstart', (e) => {
            if (e.target.tagName === 'INPUT') return;
            const row = e.target.closest('.item-row');
            if (!row) return;
            activeRow = row; touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
            activeRow.style.transition = 'none'; isSwiping = false;
        }, { passive: true });

        wrapperEl.addEventListener('touchmove', (e) => {
            if (!activeRow || isSwiping === false && Math.abs(e.touches[0].clientY - touchStartY) > 10) return;
            const dX = e.touches[0].clientX - touchStartX;
            if (Math.abs(dX) > 10) isSwiping = true;
            if (isSwiping) {
                let translateX = dX;
                if (dX > 80) translateX = 80 + (dX - 80) * 0.2;
                if (dX < -80) translateX = -80 + (dX + 80) * 0.2;
                activeRow.style.transform = `translateX(${translateX}px)`;
                activeRow.style.backgroundColor = dX > 30 ? 'rgba(255, 107, 0, 0.1)' : (dX < -30 ? 'rgba(255, 59, 48, 0.1)' : '');
            }
        }, { passive: true });

        wrapperEl.addEventListener('touchend', (e) => {
            if (!activeRow) return;
            activeRow.style.transition = 'transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.3s ease';
            activeRow.style.transform = ''; activeRow.style.backgroundColor = '';
            const dX = e.changedTouches[0].clientX - touchStartX;
            const index = parseInt(activeRow.id.replace('item-row-', ''));
            if (isSwiping) {
                if (dX > 65) toggleSkip(index);
                else if (dX < -65) {
                    if(confirm("Видалити повністю?")) deleteItem(index);
                }
            }
            activeRow = null; isSwiping = false;
        });

        // --- SHAKE TO UNDO ---
        let lastShakeTime = 0;
        window.addEventListener('devicemotion', (e) => {
            const acc = e.accelerationIncludingGravity;
            if (!acc) return;
            const speed = Math.sqrt(acc.x * acc.x + acc.y * acc.y + acc.z * acc.z);
            const now = Date.now();
            if (speed > 20 && (now - lastShakeTime > 2000)) {
                if (historyStack.length > 0) {
                    lastShakeTime = now;
                    if (confirm("🚨 Повернути список на крок назад?")) triggerUndo();
                }
            }
        });

        function sendToViber() {
            let messageText = "Замовлення СушіХаус\n\n";
            let hasOrders = false;
            appItems.forEach(item => {
                const count = parseInt(item.count);
                if (!isNaN(count) && count > 0 && !item.skipped) {
                    messageText += `${item.name}: ${count} шт\n`;
                    hasOrders = true;
                }
            });
            if (!hasOrders) {
                alert("Вкажіть кількість хоча б для одного інгредієнта!");
                return;
            }
            window.location.href = `viber://forward?text=${encodeURIComponent(messageText)}`;
        }

        // Запуск
        loadData();
        renderItems();
    </script>
</body>
</html>
