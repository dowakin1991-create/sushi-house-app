<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Рудь+Суші">
    <link rel="apple-touch-icon" href="99732790-9490-42b7-b24e-e0f618f484b9.jpg">
    <title>Рудь + СушіХаус</title>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg-color: #f2f2f7;
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-main: #000000;
            --text-secondary: #8e8e93;
            --input-bg: rgba(0, 0, 0, 0.04);
            --item-border: rgba(0, 0, 0, 0.08);
            --shadow: rgba(0, 0, 0, 0.06);
            
            --accent: #ff6b00;
            --accent-glow: rgba(255, 107, 0, 0.2);
            --danger: #ff3b30;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --glass-bg: rgba(28, 28, 30, 0.7);
                --glass-border: rgba(255, 255, 255, 0.1);
                --text-main: #ffffff;
                --text-secondary: #ebebf5;
                --input-bg: rgba(255, 255, 255, 0.1);
                --item-border: rgba(255, 255, 255, 0.08);
                --shadow: rgba(0, 0, 0, 0.4);
                
                --accent: #ff8c33;
                --accent-glow: rgba(255, 140, 51, 0.2);
            }
        }

        html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            background-image: radial-gradient(circle at 10% 0%, var(--accent-glow) 0%, transparent 50%), 
                              radial-gradient(circle at 90% 100%, var(--accent-glow) 0%, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: calc(env(safe-area-inset-top) + 16px) 16px calc(env(safe-area-inset-bottom) + 80px) 16px;
            -webkit-overflow-scrolling: touch; 
            overflow-x: hidden;
            transition: background-image 0.6s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.6s ease;
        }

        #splash-screen {
            position: fixed; inset: 0; z-index: 9999;
            background-color: var(--bg-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1), transform 0.7s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.7s;
        }
        .splash-logo {
            width: 140px; height: 140px; border-radius: 35px;
            box-shadow: 0 20px 50px var(--shadow); object-fit: cover;
            animation: pulseLogo 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        @keyframes pulseLogo {
            0%, 100% { transform: scale(1); box-shadow: 0 20px 50px var(--shadow); }
            50% { transform: scale(1.05); box-shadow: 0 30px 60px var(--accent-glow); }
        }
        body.app-loaded #splash-screen { opacity: 0; transform: scale(1.1); visibility: hidden; }

        #main-app { opacity: 0; transform: translateY(20px); transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        body.app-loaded #main-app { opacity: 1; transform: translateY(0); }

        .header { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
        
        .logo {
            width: 80px; height: 80px; border-radius: 22px; box-shadow: 0 12px 30px var(--shadow);
            margin-bottom: 16px; background: var(--glass-bg);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            backdrop-filter: blur(20px) saturate(180%); object-fit: cover;
        }

        .segmented-control {
            position: relative; display: flex; width: 100%; max-width: 360px;
            background: var(--input-bg); border-radius: 16px; padding: 4px; margin-bottom: 8px;
        }
        .segment-pill {
            position: absolute; top: 4px; bottom: 4px; left: 4px; width: calc(50% - 4px);
            background: var(--glass-bg); border-radius: 12px;
            box-shadow: 0 4px 15px var(--shadow); border: 1px solid var(--glass-border);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1; -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
        }
        .segment-btn {
            position: relative; z-index: 2; flex: 1; padding: 12px 4px; text-align: center;
            font-weight: 700; font-size: 15px; color: var(--text-secondary);
            border-radius: 12px; cursor: pointer; border: none; background: transparent;
            transition: color 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .segment-btn.active { color: var(--text-main); }
        .segment-btn span { font-size: 18px; }

        .search-panel { padding: 4px; margin-bottom: 12px; }
        .search-panel input {
            width: 100%; height: 48px; background: var(--input-bg); border: none;
            border-radius: 14px; padding: 0 16px; color: var(--text-main); font-size: 17px;
            font-family: inherit; transition: background 0.3s;
        }
        .search-panel input:focus { background: rgba(0,0,0,0.08); outline: none; }
        @media (prefers-color-scheme: dark) { .search-panel input:focus { background: rgba(255,255,255,0.15); } }

        .progress-panel { padding: 16px; margin-bottom: 16px; }
        .progress-info { display: flex; justify-content: space-between; font-size: 14px; font-weight: 700; color: var(--text-secondary); margin-bottom: 10px; }
        .progress-bar { width: 100%; height: 8px; background: var(--input-bg); border-radius: 4px; overflow: hidden; }
        #progress-fill { height: 100%; width: 0%; background: var(--accent); border-radius: 4px; transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.5s ease; }

        /* Кнопки керування (Редагувати / Очистити) */
        .action-buttons { display: flex; gap: 12px; margin-bottom: 20px; }
        .btn-secondary {
            flex: 1; background: var(--glass-bg); border: 1px solid var(--glass-border);
            color: var(--text-main); border-radius: 16px; padding: 14px;
            font-size: 15px; font-weight: 700; cursor: pointer; text-align: center;
            -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
            transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 4px 15px var(--shadow);
        }
        .btn-secondary:active { opacity: 0.6; transform: scale(0.96); }
        .btn-secondary.active { color: var(--accent); border-color: var(--accent); }

        .glass-panel {
            background: var(--glass-bg); border-radius: 24px; border: 1px solid var(--glass-border);
            -webkit-backdrop-filter: blur(40px) saturate(200%); backdrop-filter: blur(40px) saturate(200%);
            box-shadow: 0 12px 40px var(--shadow); padding: 16px; margin-bottom: 20px;
            transform: translateZ(0); 
        }

        .category-title {
            font-size: 13px; font-weight: 800; color: var(--accent);
            margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px;
            transition: color 0.4s ease; padding-left: 4px;
        }

        .list-container { display: flex; flex-direction: column; gap: 10px; }

        .item-row {
            display: flex; justify-content: space-between; align-items: center; flex-wrap: nowrap;
            padding: 10px 12px; background: transparent; border-radius: 16px; min-height: 54px;
            will-change: transform, background-color;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease, background-color 0.3s ease;
        }
        .item-row.skipped { opacity: 0.35; filter: grayscale(100%); }

        .item-name { font-size: 17px; font-weight: 600; flex: 1; padding-right: 8px; pointer-events: none; word-break: break-word; line-height: 1.2; letter-spacing: -0.3px; }
        
        .controls { display: flex; align-items: center; gap: 8px; pointer-events: auto; flex-shrink: 0; }
        
        .delete-btn {
            background: var(--danger); color: white; border: none; border-radius: 12px;
            width: 40px; height: 40px; font-size: 18px; font-weight: bold;
            display: none; justify-content: center; align-items: center; cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 59, 48, 0.3);
        }

        /* Режим редагування */
        .edit-mode .controls { display: none !important; }
        .edit-mode .delete-btn { display: flex !important; }

        input[type="number"] {
            width: 58px; height: 40px; background: var(--input-bg); border: none;
            border-radius: 12px; color: var(--text-main); font-size: 17px !important;
            font-weight: 700; text-align: center; font-family: inherit; -moz-appearance: textfield;
            transition: box-shadow 0.2s;
        }
        input[type="number"]:focus { outline: 2px solid var(--accent); background: transparent; }
        input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .unit-select {
            background: var(--input-bg); border: none; color: var(--text-secondary);
            font-size: 14px; font-weight: 700; font-family: inherit;
            padding: 0 8px; height: 40px; border-radius: 10px; outline: none; appearance: none; -webkit-appearance: none;
            cursor: pointer; text-align: center; transition: color 0.3s;
        }
        .unit-select:focus { color: var(--accent); }

        .add-custom { display: flex; flex-direction: column; gap: 12px; }
        .add-row { display: flex; gap: 10px; }
        .add-custom input[type="text"] {
            flex: 1; height: 50px; background: var(--input-bg); border: none;
            border-radius: 14px; padding: 0 16px; color: var(--text-main); font-size: 17px !important; font-weight: 500;
        }
        .add-custom select {
            height: 48px; background: var(--input-bg); border: none;
            border-radius: 14px; padding: 0 12px; color: var(--text-main); font-size: 16px; font-weight: 600;
            font-family: inherit; flex: 1; -webkit-appearance: none;
        }
        .btn-add { height: 50px; background: var(--input-bg); color: var(--accent); border: none; border-radius: 14px; padding: 0 20px; font-size: 17px; font-weight: 700; transition: color 0.4s ease; cursor: pointer; }
        .btn-add:active { opacity: 0.6; }

        .btn-submit {
            width: 100%; min-height: 60px; background: var(--accent); color: #fff;
            border: none; border-radius: 20px; font-size: 18px; font-weight: 700; letter-spacing: -0.5px;
            display: flex; justify-content: center; align-items: center; padding: 12px;
            box-shadow: 0 10px 25px var(--accent-glow); margin-bottom: 20px;
            transition: transform 0.15s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.4s ease, box-shadow 0.4s ease;
        }
        .btn-submit:active { transform: scale(0.95); }

        .undo-toast {
            position: fixed; bottom: calc(env(safe-area-inset-bottom) + 20px); left: 16px; right: 16px;
            min-height: 58px; background: rgba(0, 0, 0, 0.85); color: white;
            border-radius: 18px; display: flex; justify-content: space-between; align-items: center;
            padding: 12px 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            transform: translateY(150px) scale(0.9); opacity: 0; pointer-events: none;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s ease;
            z-index: 1000; -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
        }
        @media (prefers-color-scheme: dark) { .undo-toast { background: rgba(255, 255, 255, 0.95); color: black; } }
        .undo-toast.show { transform: translateY(0) scale(1); opacity: 1; pointer-events: auto; }
        .btn-undo-action { background: transparent; border: none; color: var(--accent); font-size: 16px; font-weight: 800; cursor: pointer; padding: 4px; transition: color 0.4s ease; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="99732790-9490-42b7-b24e-e0f618f484b9.jpg" alt="Логотип" class="splash-logo">
    </div>

    <div id="main-app">
        <div class="header">
            <img src="99732790-9490-42b7-b24e-e0f618f484b9.jpg" alt="Логотип" class="logo">
            
            <div class="segmented-control">
                <div class="segment-pill" id="segment-pill"></div>
                <button class="segment-btn active" id="tab-sushi" onclick="switchTab('sushi')"><span>🍣</span> СушіХаус</button>
                <button class="segment-btn" id="tab-rud" onclick="switchTab('rud')"><span>🧊</span> Рудь</button>
            </div>
        </div>

        <div class="glass-panel search-panel">
            <input type="text" id="search-input" placeholder="🔍 Знайти продукт..." oninput="handleSearch(this.value)">
        </div>

        <div class="glass-panel progress-panel">
            <div class="progress-info">
                <span>Прогрес</span>
                <span id="progress-text">0 / 0</span>
            </div>
            <div class="progress-bar">
                <div id="progress-fill"></div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn-secondary" id="edit-btn" onclick="toggleEditMode()"><span>✏️</span> Редагувати</button>
            <button class="btn-secondary" onclick="clearCounts()"><span>🔄</span> Очистити</button>
        </div>

        <div id="lists-wrapper"></div>

        <div class="glass-panel">
            <div class="add-custom">
                <div class="add-row">
                    <input type="text" id="new-item-input" placeholder="Власна позиція...">
                    <button class="btn-add" onclick="addNewItem()">Додати</button>
                </div>
                <select id="new-item-category"></select>
            </div>
        </div>

        <button class="btn-submit" id="btn-submit-main" onclick="sendToViber()">Надіслати у Viber</button>
    </div>

    <div id="undo-toast" class="undo-toast">
        <span id="undo-toast-text" style="font-weight: 600; font-size: 16px;">Дію виконано</span>
        <button class="btn-undo-action" onclick="triggerUndo()">СКАСУВАТИ</button>
    </div>

    <script>
        const STORAGE_KEY_SUSHI = 'sushiItems_v11';
        const STORAGE_KEY_RUD = 'rudItems_v11';
        let currentTab = 'sushi'; 
        let currentSearch = '';
        let appItems = []; 
        let historyStack = [];
        let toastTimeout = null;
        let isEditMode = false;

        const THEME_SUSHI = { accent: '#ff6b00', glow: 'rgba(255, 107, 0, 0.2)' };
        const THEME_SUSHI_DARK = { accent: '#ff8c33', glow: 'rgba(255, 140, 51, 0.2)' };
        const THEME_RUD = { accent: '#0ea5e9', glow: 'rgba(14, 165, 233, 0.25)' };
        const THEME_RUD_DARK = { accent: '#38bdf8', glow: 'rgba(56, 189, 248, 0.25)' };

        const defaultSushi = [
            { name: "Креветки", category: "🐟 Риба та морепродукти", unit: "шт" },
            { name: "Вугор", category: "🐟 Риба та морепродукти", unit: "шт" },
            { name: "Бейбі восьминіг", category: "🐟 Риба та морепродукти", unit: "шт" },
            { name: "Ікра масаго", category: "🐟 Риба та морепродукти", unit: "шт" },
            { name: "Лосось", category: "🐟 Риба та морепродукти", unit: "шт" },
            { name: "Копчений лосось", category: "🐟 Риба та морепродукти", unit: "шт" },
            { name: "Сніжний краб", category: "🐟 Риба та морепродукти", unit: "шт" },
            
            { name: "Крем-сир", category: "🧀 Сири та бакалія", unit: "шт" },
            { name: "Кляр темпура", category: "🧀 Сири та бакалія", unit: "шт" },
            { name: "Сухарі панко", category: "🧀 Сири та бакалія", unit: "шт" },
            { name: "Чука", category: "🧀 Сири та бакалія", unit: "шт" },
            { name: "Норі", category: "🧀 Сири та бакалія", unit: "шт" },
            { name: "Рис", category: "🧀 Сири та бакалія", unit: "шт" },
            
            { name: "Соус Унагі", category: "🥫 Соуси та приправи", unit: "шт" },
            { name: "Горіховий соус", category: "🥫 Соуси та приправи", unit: "шт" },
            { name: "Устричний соус", category: "🥫 Соуси та приправи", unit: "шт" },
            { name: "Імбир", category: "🥫 Соуси та приправи", unit: "шт" },
            { name: "Васабі", category: "🥫 Соуси та приправи", unit: "шт" },
            { name: "Мірін", category: "🥫 Соуси та приправи", unit: "шт" },
            { name: "Кікоман", category: "🥫 Соуси та приправи", unit: "шт" },
            { name: "Рисовий оцет", category: "🥫 Соуси та приправи", unit: "шт" },
            { name: "Листя комбо", category: "🥫 Соуси та приправи", unit: "шт" },
            
            { name: "Бамбукові листя", category: "📦 Пакування та інвентар", unit: "шт" },
            { name: "Палички", category: "📦 Пакування та інвентар", unit: "шт" },
            { name: "Фіксатори", category: "📦 Пакування та інвентар", unit: "шт" },
            { name: "Макісу", category: "📦 Пакування та інвентар", unit: "шт" }
        ];

        const defaultRud = [
            { name: "Морозиво", category: "🧊 Продукти Рудь", unit: "шт" },
            { name: "Картопляні діпи", category: "🧊 Продукти Рудь", unit: "уп" },
            { name: "Деруни", category: "🧊 Продукти Рудь", unit: "уп" },
            { name: "Картопляне пюре", category: "🧊 Продукти Рудь", unit: "кг" },
            { name: "Кільця кальмара в паніровці", category: "🧊 Продукти Рудь", unit: "уп" },
            { name: "Креветки в паніровці", category: "🧊 Продукти Рудь", unit: "уп" },
            { name: "Картопля фрі", category: "🧊 Продукти Рудь", unit: "уп" }
        ];

        const unitsList = ['шт', 'кг', 'л', 'уп'];

        window.onload = () => {
            setTimeout(() => { document.body.classList.add('app-loaded'); }, 1800);
            switchTab('sushi');
        };

        function getStorageKey() { return currentTab === 'sushi' ? STORAGE_KEY_SUSHI : STORAGE_KEY_RUD; }

        function loadData() {
            const savedData = localStorage.getItem(getStorageKey());
            if (savedData) {
                appItems = JSON.parse(savedData);
            } else {
                const defaults = currentTab === 'sushi' ? defaultSushi : defaultRud;
                appItems = defaults.map(item => ({ name: item.name, category: item.category, unit: item.unit, count: '', skipped: false }));
                saveData();
            }
        }

        function saveData() { localStorage.setItem(getStorageKey(), JSON.stringify(appItems)); }

        function switchTab(tabId) {
            currentTab = tabId;
            const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            const root = document.documentElement;

            if(tabId === 'rud') {
                document.getElementById('segment-pill').style.transform = 'translateX(calc(100% + 8px))';
                document.getElementById('btn-submit-main').innerText = 'Надіслати Рудь 🚀';
                root.style.setProperty('--accent', isDark ? THEME_RUD_DARK.accent : THEME_RUD.accent);
                root.style.setProperty('--accent-glow', isDark ? THEME_RUD_DARK.glow : THEME_RUD.glow);
            } else {
                document.getElementById('segment-pill').style.transform = 'translateX(0)';
                document.getElementById('btn-submit-main').innerText = 'Надіслати Суші 🚀';
                root.style.setProperty('--accent', isDark ? THEME_SUSHI_DARK.accent : THEME_SUSHI.accent);
                root.style.setProperty('--accent-glow', isDark ? THEME_SUSHI_DARK.glow : THEME_SUSHI.glow);
            }

            document.getElementById('tab-sushi').classList.toggle('active', tabId === 'sushi');
            document.getElementById('tab-rud').classList.toggle('active', tabId === 'rud');

            // Скидання пошуку та історії
            document.getElementById('search-input').value = '';
            currentSearch = '';
            historyStack = [];
            document.getElementById('undo-toast').classList.remove('show');
            
            // Вимикаємо режим редагування при перемиканні вкладки
            if (isEditMode) toggleEditMode();
            
            updateCategorySelect();
            loadData();
            renderItems();
        }

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => { switchTab(currentTab); });

        function updateCategorySelect() {
            const select = document.getElementById('new-item-category');
            select.innerHTML = '';
            const categories = currentTab === 'sushi' 
                ? ["🐟 Риба та морепродукти", "🧀 Сири та бакалія", "🥫 Соуси та приправи", "📦 Пакування та інвентар"]
                : ["🧊 Продукти Рудь", "📦 Інше"];
            
            categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat; opt.innerText = cat;
                select.appendChild(opt);
            });
        }

        function pushToHistory(msg) {
            if (historyStack.length >= 10) historyStack.shift();
            historyStack.push(JSON.stringify(appItems));
            showUndoToast(msg);
        }

        function showUndoToast(msg) {
            const toast = document.getElementById('undo-toast');
            document.getElementById('undo-toast-text').innerText = msg;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.remove('show'), 4000);
        }

        function triggerUndo() {
            if (historyStack.length > 0) {
                appItems = JSON.parse(historyStack.pop());
                saveData();
                renderItems();
                document.getElementById('undo-toast').classList.remove('show');
            }
        }

        function getOrder(item) {
            if (item.skipped) return 3; 
            if (item.count !== '' && Number(item.count) > 0) return 2; 
            return 1; 
        }

        function updateProgress() {
            const total = appItems.length;
            const processed = appItems.filter(item => item.skipped || (item.count !== '' && Number(item.count) > 0)).length;
            document.getElementById('progress-text').innerText = `${processed} / ${total}`;
            const percentage = total > 0 ? (processed / total) * 100 : 0;
            document.getElementById('progress-fill').style.width = `${percentage}%`;
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            const wrapper = document.getElementById('lists-wrapper');
            const btn = document.getElementById('edit-btn');
            
            if (isEditMode) {
                wrapper.classList.add('edit-mode');
                btn.classList.add('active');
                btn.innerHTML = '<span>✓</span> Готово';
            } else {
                wrapper.classList.remove('edit-mode');
                btn.classList.remove('active');
                btn.innerHTML = '<span>✏️</span> Редагувати';
            }
        }

        function clearCounts() {
            if(confirm("Очистити всі введені цифри в цій вкладці?")) {
                pushToHistory("Очищено весь список");
                appItems.forEach(item => { item.count = ''; item.skipped = false; });
                saveData();
                renderItems();
            }
        }

        function renderItems() {
            const wrapper = document.getElementById('lists-wrapper');
            wrapper.innerHTML = '';

            const categories = currentTab === 'sushi' 
                ? ["🐟 Риба та морепродукти", "🧀 Сири та бакалія", "🥫 Соуси та приправи", "📦 Пакування та інвентар"]
                : ["🧊 Продукти Рудь", "📦 Інше"];

            categories.forEach(cat => {
                const catItems = appItems.filter(item => item.category === cat && item.name.toLowerCase().includes(currentSearch.toLowerCase().trim()));
                if (catItems.length === 0) return;

                const panel = document.createElement('div');
                panel.className = 'glass-panel';

                const title = document.createElement('div');
                title.className = 'category-title';
                title.innerText = cat;
                panel.appendChild(title);

                const listContainer = document.createElement('div');
                listContainer.className = 'list-container';

                catItems.forEach(item => {
                    const globalIndex = appItems.findIndex(i => i.name === item.name);
                    const row = document.createElement('div');
                    row.className = 'item-row' + (item.skipped ? ' skipped' : '');
                    row.style.order = getOrder(item);
                    row.id = 'item-row-' + globalIndex;
                    
                    let unitOptions = '';
                    unitsList.forEach(u => {
                        const selected = (item.unit || 'шт') === u ? 'selected' : '';
                        unitOptions += `<option value="${u}" ${selected}>${u}</option>`;
                    });

                    row.innerHTML = `
                        <div class="item-name">${item.name}</div>
                        <div class="controls">
                            <input type="number" inputmode="numeric" min="0" placeholder="0" 
                                   value="${item.count}" 
                                   oninput="handleInput(${globalIndex}, this.value)"
                                   onblur="handleBlur(${globalIndex})">
                            <select class="unit-select" onchange="handleUnitChange(${globalIndex}, this.value)">
                                ${unitOptions}
                            </select>
                        </div>
                        <button class="delete-btn" onclick="deleteItem(${globalIndex})">✕</button>
                    `;
                    listContainer.appendChild(row);
                });

                panel.appendChild(listContainer);
                wrapper.appendChild(panel);
            });
            
            // Якщо редагування увімкнене, відновлюємо стан
            if (isEditMode) wrapper.classList.add('edit-mode');
            
            updateProgress();
        }

        function handleSearch(value) { currentSearch = value; renderItems(); }

        function handleInput(index, value) {
            if (value < 0) value = 0;
            appItems[index].count = value;
            if (value !== '' && Number(value) > 0) appItems[index].skipped = false;
            saveData();
            updateProgress();
        }

        function handleBlur(index) {
            const row = document.getElementById('item-row-' + index);
            if (row) {
                row.style.order = getOrder(appItems[index]);
                row.className = 'item-row' + (appItems[index].skipped ? ' skipped' : '');
            }
        }

        function handleUnitChange(index, value) {
            appItems[index].unit = value;
            saveData();
        }

        function toggleSkip(index) {
            pushToHistory(`Пропущено: ${appItems[index].name}`);
            appItems[index].skipped = !appItems[index].skipped;
            if (appItems[index].skipped) appItems[index].count = '';
            saveData();
            renderItems();
        }

        function addNewItem() {
            const input = document.getElementById('new-item-input');
            const catSelect = document.getElementById('new-item-category');
            const itemName = input.value.trim();
            if (itemName !== "") {
                pushToHistory(`Додано: ${itemName}`);
                appItems.push({ name: itemName, category: catSelect.value, unit: 'шт', count: '', skipped: false });
                saveData();
                input.value = ''; 
                renderItems(); 
            }
        }

        function deleteItem(index) {
            pushToHistory(`Видалено: ${appItems[index].name}`);
            appItems.splice(index, 1);
            saveData();
            renderItems();
        }

        let touchStartX = 0; let touchStartY = 0; let activeRow = null; let isSwiping = false;
        const wrapperEl = document.getElementById('lists-wrapper');
        
        wrapperEl.addEventListener('touchstart', (e) => {
            if (isEditMode || e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'BUTTON') return;
            const row = e.target.closest('.item-row');
            if (!row) return;
            activeRow = row; touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
            activeRow.style.transition = 'none'; isSwiping = false;
        }, { passive: true });

        wrapperEl.addEventListener('touchmove', (e) => {
            if (!activeRow || isSwiping === false && Math.abs(e.touches[0].clientY - touchStartY) > 10) return;
            const dX = e.touches[0].clientX - touchStartX;
            if (Math.abs(dX) > 10) isSwiping = true;
            if (isSwiping) {
                let translateX = dX;
                if (dX > 80) translateX = 80 + (dX - 80) * 0.2;
                if (dX < -80) translateX = -80 + (dX + 80) * 0.2;
                activeRow.style.transform = `translateX(${translateX}px)`;
                
                const glow = getComputedStyle(document.documentElement).getPropertyValue('--accent-glow');
                if (dX > 30) {
                    activeRow.style.backgroundColor = glow;
                } else if (dX < -30) {
                    activeRow.style.backgroundColor = 'rgba(255, 59, 48, 0.15)'; 
                } else {
                    activeRow.style.backgroundColor = '';
                }
            }
        }, { passive: true });

        wrapperEl.addEventListener('touchend', (e) => {
            if (!activeRow) return;
            activeRow.style.transition = 'transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.4s ease';
            activeRow.style.transform = ''; activeRow.style.backgroundColor = '';
            const dX = e.changedTouches[0].clientX - touchStartX;
            const index = parseInt(activeRow.id.replace('item-row-', ''));
            if (isSwiping) {
                if (dX > 65) toggleSkip(index);
                else if (dX < -65) {
                    if(confirm("Видалити позицію повністю?")) deleteItem(index);
                }
            }
            activeRow = null; isSwiping = false;
        });

        window.addEventListener('devicemotion', (e) => {
            const acc = e.accelerationIncludingGravity;
            if (!acc) return;
            const speed = Math.sqrt(acc.x * acc.x + acc.y * acc.y + acc.z * acc.z);
            const now = Date.now();
            if (speed > 20 && (now - lastShakeTime > 2000)) {
                if (historyStack.length > 0) {
                    lastShakeTime = now;
                    if (confirm("🚨 Бажаєш скасувати останню дію?")) triggerUndo();
                }
            }
        });

        function sendToViber() {
            let messageText = currentTab === 'sushi' ? "Замовлення СушіХаус\n\n" : "Замовлення Рудь\n\n";
            let hasOrders = false;
            
            appItems.forEach(item => {
                const count = parseFloat(item.count);
                if (!isNaN(count) && count > 0 && !item.skipped) {
                    messageText += `${item.name}: ${count} ${item.unit || 'шт'}\n`;
                    hasOrders = true;
                }
            });
            if (!hasOrders) {
                alert("Вкажіть кількість хоча б для однієї позиції!");
                return;
            }
            window.location.href = `viber://forward?text=${encodeURIComponent(messageText)}`;
        }
    </script>
</body>
</html>
