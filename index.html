<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="СушіХаус">
    <link rel="apple-touch-icon" href="IMG_0329.jpeg">
    <title>Замовлення СушіХаус</title>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg-color: #f2f2f7;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #000000;
            --text-secondary: #8e8e93;
            --accent: #ff6b00;
            --danger: #ff3b30;
            --input-bg: rgba(0, 0, 0, 0.05);
            --item-border: rgba(0, 0, 0, 0.1);
            --shadow: rgba(0, 0, 0, 0.08);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --glass-bg: rgba(28, 28, 30, 0.65);
                --glass-border: rgba(255, 255, 255, 0.1);
                --text-main: #ffffff;
                --text-secondary: #ebebf5;
                --accent: #ff8c33;
                --danger: #ff453a;
                --input-bg: rgba(255, 255, 255, 0.1);
                --item-border: rgba(255, 255, 255, 0.1);
                --shadow: rgba(0, 0, 0, 0.5);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            background-image: radial-gradient(circle at 0% 0%, rgba(255, 107, 0, 0.15) 0%, transparent 50%), 
                              radial-gradient(circle at 100% 100%, rgba(255, 107, 0, 0.1) 0%, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: calc(env(safe-area-inset-top) + 20px) 16px calc(env(safe-area-inset-bottom) + 20px) 16px;
            -webkit-overflow-scrolling: touch; 
        }

        .header { text-align: center; margin-bottom: 16px; position: relative; }
        
        .logo {
            width: 90px; height: 90px; border-radius: 22px; box-shadow: 0 8px 24px var(--shadow);
            margin-bottom: 12px; background: var(--glass-bg);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            backdrop-filter: blur(20px) saturate(180%); object-fit: cover;
        }

        h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 16px;}

        .action-buttons {
            display: flex; justify-content: space-between; gap: 8px; margin-bottom: 16px;
        }

        .btn-secondary {
            flex: 1; background: var(--glass-bg); border: 1px solid var(--glass-border);
            color: var(--text-main); border-radius: 14px; padding: 10px 2px;
            font-size: 13px; font-weight: 600; cursor: pointer; text-align: center;
            -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
            transition: opacity 0.2s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 4px; height: 50px;
        }
        
        .btn-secondary span { font-size: 18px; }
        .btn-secondary:active { opacity: 0.6; }
        .btn-secondary.active { color: var(--danger); border-color: var(--danger); }

        .glass-panel {
            background: var(--glass-bg); border-radius: 20px; border: 1px solid var(--glass-border);
            -webkit-backdrop-filter: blur(24px) saturate(180%); backdrop-filter: blur(24px) saturate(180%);
            box-shadow: 0 10px 30px var(--shadow); padding: 16px; margin-bottom: 20px;
            transform: translateZ(0); 
        }

        .list-container { display: flex; flex-direction: column; gap: 12px; }

        .item-row {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 12px; border-bottom: 1px solid var(--item-border);
            transition: opacity 0.3s ease;
        }

        .item-row:last-child { border-bottom: none; padding-bottom: 0; }

        /* Стилі для пропущених інгредієнтів (сірі) */
        .item-row.skipped {
            opacity: 0.35;
        }

        .item-name { font-size: 17px; font-weight: 500; flex: 1; }

        .controls { display: flex; align-items: center; gap: 8px; transition: opacity 0.2s; }

        .btn-skip {
            width: 36px; height: 36px; background: var(--input-bg); border: none;
            border-radius: 10px; color: var(--text-secondary); font-size: 20px; font-weight: 500;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        .btn-skip:active { opacity: 0.5; }

        input[type="number"] {
            width: 60px; height: 36px; background: var(--input-bg); border: none;
            border-radius: 10px; color: var(--text-main); font-size: 17px;
            font-weight: 600; text-align: center; font-family: inherit; -moz-appearance: textfield;
        }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .unit { font-size: 15px; color: var(--text-secondary); font-weight: 500; width: 24px; }

        .delete-btn {
            background: var(--danger); color: white; border: none; border-radius: 10px;
            width: 36px; height: 36px; font-size: 18px; font-weight: bold;
            display: none; justify-content: center; align-items: center; cursor: pointer;
        }

        /* Стан редагування */
        .edit-mode .controls { display: none; }
        .edit-mode .delete-btn { display: flex; }

        .add-custom { display: flex; gap: 10px; }
        .add-custom input[type="text"] {
            flex: 1; height: 44px; background: var(--input-bg); border: none;
            border-radius: 12px; padding: 0 16px; color: var(--text-main); font-size: 17px;
        }
        .btn-add {
            background: var(--input-bg); color: var(--accent); border: none;
            border-radius: 12px; padding: 0 20px; font-size: 17px; font-weight: 600;
        }

        .btn-submit {
            width: 100%; height: 54px; background: var(--accent); color: #fff;
            border: none; border-radius: 16px; font-size: 17px; font-weight: 600;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 14px rgba(255, 107, 0, 0.4); margin-bottom: 20px;
        }
        .btn-submit:active { transform: scale(0.97); opacity: 0.9; }
    </style>
</head>
<body>

    <div class="header">
        <img src="IMG_0329.jpeg" alt="СушіХаус лого" class="logo">
        <h1>Замовлення</h1>
    </div>

    <div class="action-buttons">
        <button class="btn-secondary" onclick="sortItems()"><span>🔤</span>Алфавіт</button>
        <button class="btn-secondary" id="edit-btn" onclick="toggleEditMode()"><span>✏️</span>Редагувати</button>
        <button class="btn-secondary" onclick="clearCounts()"><span>🔄</span>Очистити</button>
    </div>

    <div class="glass-panel" id="list-panel">
        <div class="list-container" id="items-list"></div>
    </div>

    <div class="glass-panel">
        <div class="add-custom">
            <input type="text" id="new-item-input" placeholder="Новий інгредієнт...">
            <button class="btn-add" onclick="addNewItem()">Додати</button>
        </div>
    </div>

    <button class="btn-submit" onclick="sendToViber()">Надіслати у Viber</button>

    <script>
        const STORAGE_KEY = 'sushiHouseItems_v2';
        let isEditMode = false;

        const defaultItems = [
            "Лосось", "Копчений лосось", "Креветки", "Вугор", 
            "Крем-сир", "Кляр темпура", "Сухарі панко", "Соус Унагі", 
            "Горіховий соус", "Устричний соус", "Імбир", "Васабі", 
            "Бейбі восьминіг", "Сніжний краб", "Ікра масаго", 
            "Бамбукові листя", "Мірін", "Кікоман", "Рисовий оцет", 
            "Чука", "Норі", "Палички", "Фіксатори", "Рис", 
            "Макісу", "Листя комбо"
        ];

        let appItems = [];

        function loadData() {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                appItems = JSON.parse(savedData);
                // Захист: якщо в старих даних не було властивості skipped
                appItems.forEach(item => { if(item.skipped === undefined) item.skipped = false; });
            } else {
                appItems = defaultItems.map(name => ({ name: name, count: '', skipped: false }));
                saveData();
            }
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(appItems));
        }

        // Визначаємо позицію (порядок) елемента
        function getOrder(item) {
            if (item.skipped) return 3; // Пропущені (сірі) - в самий низ
            if (item.count !== '' && Number(item.count) > 0) return 2; // Введені - передостанні
            return 1; // Чисті, які ще треба заповнити - зверху
        }

        function renderItems() {
            const listContainer = document.getElementById('items-list');
            listContainer.innerHTML = '';

            appItems.forEach((item, index) => {
                const row = document.createElement('div');
                
                let classes = 'item-row';
                if (item.skipped) classes += ' skipped';
                row.className = classes;
                
                row.style.order = getOrder(item);
                row.id = 'item-row-' + index;
                
                row.innerHTML = `
                    <div class="item-name">${item.name}</div>
                    <div class="controls">
                        <button class="btn-skip" onclick="toggleSkip(${index})">–</button>
                        <input type="number" inputmode="numeric" min="0" placeholder="0" 
                               value="${item.count}" 
                               oninput="handleInput(${index}, this.value)"
                               onblur="handleBlur(${index})">
                        <span class="unit">шт</span>
                    </div>
                    <button class="delete-btn" onclick="deleteItem(${index})">✕</button>
                `;
                listContainer.appendChild(row);
            });
        }

        // Обробляємо ввід, але НЕ змінюємо позицію відразу (щоб не стрибало)
        function handleInput(index, value) {
            if (value < 0) value = 0;
            appItems[index].count = value;
            
            // Якщо ми щось ввели, пункт автоматично перестає бути "сірим"
            if (value !== '' && Number(value) > 0) {
                appItems[index].skipped = false;
            }
            saveData();
        }

        // Змінюємо позицію лише тоді, коли зняли фокус з поля
        function handleBlur(index) {
            const row = document.getElementById('item-row-' + index);
            if (row) {
                row.style.order = getOrder(appItems[index]);
                row.className = 'item-row' + (appItems[index].skipped ? ' skipped' : '');
            }
        }

        // Функція для кнопки "–"
        function toggleSkip(index) {
            appItems[index].skipped = !appItems[index].skipped;
            if (appItems[index].skipped) {
                appItems[index].count = ''; // Очищаємо цифру
                const row = document.getElementById('item-row-' + index);
                if (row) row.querySelector('input').value = '';
            }
            saveData();
            handleBlur(index); // Одразу оновлюємо вигляд і позицію
        }

        function addNewItem() {
            const input = document.getElementById('new-item-input');
            const itemName = input.value.trim();

            if (itemName !== "") {
                appItems.push({ name: itemName, count: '', skipped: false });
                saveData();
                input.value = ''; 
                renderItems(); 
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }
        }

        function deleteItem(index) {
            if (confirm(`Видалити "${appItems[index].name}" зі списку?`)) {
                appItems.splice(index, 1);
                saveData();
                renderItems();
            }
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            const panel = document.getElementById('list-panel');
            const btn = document.getElementById('edit-btn');
            
            if (isEditMode) {
                panel.classList.add('edit-mode');
                btn.classList.add('active');
                btn.innerHTML = '<span>✓</span>Готово';
            } else {
                panel.classList.remove('edit-mode');
                btn.classList.remove('active');
                btn.innerHTML = '<span>✏️</span>Редагувати';
            }
        }

        // Очищення тепер знімає і цифри, і "сірі" статуси
        function clearCounts() {
            if (confirm('Очистити всі цифри та повернути список у початковий стан?')) {
                appItems.forEach(item => {
                    item.count = '';
                    item.skipped = false;
                });
                saveData();
                renderItems();
            }
        }

        function sortItems() {
            if (confirm('Відсортувати всі інгредієнти за алфавітом?')) {
                appItems.sort((a, b) => a.name.localeCompare(b.name, 'uk'));
                saveData();
                renderItems();
            }
        }

        function sendToViber() {
            let messageText = "Замовлення СушіХаус\n\n";
            let hasOrders = false;

            appItems.forEach(item => {
                const count = parseInt(item.count);
                if (!isNaN(count) && count > 0 && !item.skipped) {
                    messageText += `${item.name}: ${count} шт\n`;
                    hasOrders = true;
                }
            });

            if (!hasOrders) {
                alert("Будь ласка, вкажіть кількість хоча б для одного інгредієнта!");
                return;
            }

            const encodedText = encodeURIComponent(messageText);
            window.location.href = `viber://forward?text=${encodedText}`;
        }

        loadData();
        renderItems();
    </script>
</body>
</html>
